<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garou Store | akun basic/premium blox fruits🍍🍎🍓🍇,script & 100% aman</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --blue: #00d2ff; --bg: #030308; --card-bg: #0f0f1a; --dana: #0076e0; --green: #25d366; --red: #ff4b2b; --gold: #ffcc00; }
        * { user-select: none; box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; overflow-x: hidden; }
        body.modal-open { overflow: hidden; }
        #particles-js { position: fixed; width: 100%; height: 100%; z-index: 1; pointer-events: none; filter: drop-shadow(0 0 8px var(--blue)); }
        nav { display: flex; justify-content: space-between; align-items: center; padding: 15px 5%; background: rgba(0,0,0,0.9); border-bottom: 2px solid var(--blue); position: sticky; top: 0; z-index: 1000; backdrop-filter: blur(10px); }
        .logo { font-weight: 900; font-size: 1.4rem; color: var(--blue); text-shadow: 0 0 20px var(--blue); letter-spacing: 2px; cursor: pointer; }
        .admin-status { display: flex; align-items: center; gap: 8px; font-size: 11px; background: rgba(37, 211, 102, 0.1); padding: 6px 15px; border-radius: 20px; border: 1px solid var(--green); font-weight: bold; }
        .pulse-dot { width: 8px; height: 8px; background: var(--green); border-radius: 50%; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0.7); } 70% { box-shadow: 0 0 0 8px rgba(37, 211, 102, 0); } 100% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0); } }
        .hero { text-align: center; padding: 40px 20px; position: relative; z-index: 2; }
        .hero h1 { font-size: 2.8rem; margin-bottom: 5px; text-shadow: 0 0 30px var(--blue); font-weight: 900; }
        .search-container { max-width: 450px; margin: 20px auto; }
        .search-container input { width: 100%; padding: 15px 25px; border-radius: 30px; border: 2px solid var(--blue); background: rgba(0,0,0,0.8); color: white; box-shadow: 0 0 15px rgba(0, 210, 255, 0.2); transition: 0.3s; }
        .container { padding: 20px 5% 60px; position: relative; z-index: 2; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; }
        .card { background: var(--card-bg); border-radius: 18px; border: 1px solid #1a1a2e; overflow: hidden; transition: 0.4s; display: flex; flex-direction: column; height: 100%; position: relative; }
        .card:hover { transform: translateY(-10px); border-color: var(--blue); box-shadow: 0 12px 40px rgba(0, 210, 255, 0.3); }
        .card-img { height: 210px; background-size: cover; background-position: center; position: relative; background-color: #111; }
        .stok-badge { position: absolute; bottom: 12px; left: 12px; background: rgba(0,0,0,0.9); padding: 6px 14px; border-radius: 20px; font-size: 11px; border: 1px solid var(--blue); color: var(--blue); font-weight: bold; }
        .status-badge { position: absolute; top: 12px; right: 12px; padding: 6px 12px; border-radius: 8px; font-size: 10px; font-weight: 900; z-index: 5; text-transform: uppercase; }
        .badge-promo { background: var(--red); color: white; animation: blink 1s infinite alternate; }
        .badge-grosir { background: var(--gold); color: black; }
        @keyframes blink { from { opacity: 1; } to { opacity: 0.7; } }
        .card-info { padding: 20px; flex-grow: 1; display: flex; flex-direction: column; }
        .price { font-size: 1.8rem; color: var(--blue); font-weight: 900; margin: 10px 0; }
        .rating-stars { color: #333; margin: 5px 0; font-size: 14px; display: flex; gap: 3px; cursor: pointer; width: fit-content; }
        .rating-stars i.active { color: var(--gold); text-shadow: 0 0 8px var(--gold); }
        .specs { list-style: none; padding: 0; font-size: 13px; color: #aaa; margin-bottom: 20px; flex-grow: 1; }
        .specs li { margin-bottom: 8px; display: flex; align-items: center; gap: 10px; }
        .review-box { margin-top: 10px; border-top: 1px solid #1a1a2e; padding-top: 10px; font-size: 11px; color: #777; max-height: 80px; overflow-y: auto; margin-bottom: 15px; }
        .review-item { margin-bottom: 8px; border-left: 2px solid var(--blue); padding-left: 8px; }
        .btn { padding: 15px; border-radius: 12px; border: none; font-weight: 900; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.2s; text-transform: uppercase; }
        .btn-buy { background: white; color: var(--dana); width: 100%; }
        #danaModal, #adminModal, #ratingModal { display: none; position: fixed; z-index: 9999; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(10px); }
        .modal-content { background: #0f0f1a; padding: 25px; border-radius: 25px; text-align: center; border: 2px solid var(--blue); max-width: 450px; width: 100%; max-height: 90vh; overflow-y: auto; }
        .admin-section { text-align: left; background: rgba(255,255,255,0.05); padding: 15px; border-radius: 15px; margin-bottom: 20px; border: 1px solid #333; }
        .admin-input, .review-input { background: #000; border: 1px solid #333; color: white; padding: 12px; border-radius: 8px; width: 100%; margin-bottom: 10px; font-size: 14px; }
        .star-select { font-size: 2.2rem; color: #222; margin-bottom: 15px; display: flex; justify-content: center; gap: 12px; }
        .star-select i { cursor: pointer; transition: 0.2s; }
        .star-select i.active { color: var(--gold); text-shadow: 0 0 15px var(--gold); }
        #successPopup { position: fixed; top: -100px; left: 50%; transform: translateX(-50%); background: #0f0f1a; border: 2px solid var(--green); padding: 15px 30px; border-radius: 50px; display: flex; align-items: center; gap: 15px; z-index: 10001; transition: 0.6s; }
        #successPopup.show { top: 30px; }
        .float-wa { position: fixed; bottom: 30px; right: 30px; background: var(--green); width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; color: white; z-index: 1000; cursor: pointer; }
        footer { text-align: center; padding: 40px; color: #444; font-size: 11px; }
    </style>
</head>
<body oncontextmenu="return false;">

<div id="particles-js"></div>

<div id="successPopup">
    <i class="fas fa-check-circle" style="color:var(--green); font-size: 24px;"></i>
    <div><strong style="color:var(--green); display:block; font-size:14px;">PEMBELIAN BERHASIL!</strong><span style="font-size:11px; color:#ccc;">Mengarahkan ke WhatsApp...</span></div>
</div>

<nav>
    <div class="logo" onclick="loginAdmin()">GAROU STORE</div>
    <div class="admin-status"><div class="pulse-dot"></div><span>ADMIN ONLINE</span></div>
</nav>

<section class="hero">
    <h1>GAROU STORE 🔥</h1>
    <p style="color:var(--blue); font-weight:bold; letter-spacing: 1px;">PREMIUM AKUN & SCRIPT SERVICE</p>
    <div class="search-container"><input type="text" id="search" placeholder="Cari barang idaman..." onkeyup="searchProduct()"></div>
</section>

<div class="container">
    <div class="grid" id="productList"></div>
</div>

<div id="ratingModal">
    <div class="modal-content">
        <h3 style="color:var(--blue);">Tulis Ulasan Anda ⭐</h3>
        <div class="star-select" id="starSelect">
            <i class="fas fa-star" onclick="setStar(1)"></i>
            <i class="fas fa-star" onclick="setStar(2)"></i>
            <i class="fas fa-star" onclick="setStar(3)"></i>
            <i class="fas fa-star" onclick="setStar(4)"></i>
            <i class="fas fa-star" onclick="setStar(5)"></i>
        </div>
        <input type="text" id="reviewerName" placeholder="Nama Anda..." class="review-input">
        <textarea id="reviewerText" placeholder="Pesan ulasan..." class="review-input" style="height:100px; resize:none;"></textarea>
        <button class="btn" style="background:var(--gold); color:black; width:100%" onclick="submitRating()">KIRIM ULASAN</button>
        <p onclick="closeRating()" style="margin-top:20px; font-size:12px; color:#555; cursor:pointer;">BATALKAN</p>
    </div>
</div>

<div id="adminModal">
    <div class="modal-content" style="max-width: 550px; text-align: left;">
        <h2 style="color:var(--blue); text-align: center;">ADMIN DASHBOARD</h2>
        <div class="admin-section">
            <h4 style="margin-top:0; color:var(--green);"><i class="fas fa-plus-circle"></i> Tambah Produk</h4>
            <input type="text" id="newNama" placeholder="Nama Produk" class="admin-input">
            <div style="display:flex; gap:10px;">
                <input type="text" id="newHarga" placeholder="Harga (7.000)" class="admin-input">
                <input type="number" id="newStok" placeholder="Stok" class="admin-input">
            </div>
            <select id="newStatus" class="admin-input" style="background:#000;">
                <option value="normal">Status: Normal</option>
                <option value="promo">Status: Promo 🔥</option>
                <option value="grosir">Status: Grosir 📦</option>
            </select>
            <input type="text" id="newImg" placeholder="Link Gambar" class="admin-input">
            <input type="text" id="newDesc" placeholder="Deskripsi (Pisah dengan koma)" class="admin-input">
            <button class="btn" style="background:var(--green); color:white; width:100%;" onclick="addNewProduct()">TAMBAHKAN</button>
        </div>
        <div class="admin-section">
            <h4 style="margin-top:0; color:var(--blue);"><i class="fas fa-edit"></i> Daftar Produk</h4>
            <div id="adminList"></div>
        </div>
        <button class="btn" style="background: var(--blue); color: white; width:100%;" onclick="saveAdminChanges()">SIMPAN PERUBAHAN</button>
        <p onclick="closeAdmin()" style="margin-top:20px; font-size:12px; color:#444; cursor:pointer; text-align:center;">TUTUP</p>
    </div>
</div>

<div id="danaModal">
    <div class="modal-content">
        <img id="modalImg" src="" style="width:100%; height: 160px; object-fit: cover; border-radius:15px; margin-bottom:15px; border:1px solid var(--blue);">
        <h3 id="modalTitle" style="color:var(--blue); margin:0;">Checkout</h3>
        <p style="font-size:12px; color:#aaa; margin:5px 0;">Transfer DANA:</p>
        <div class="num-box" style="background:#000; padding:15px; border:2px dashed var(--blue); margin:10px 0; color:var(--blue); font-weight:900; font-size:1.5rem;" onclick="copyNum()">081469870881</div>
        <button id="btnTransfer" class="btn" style="background: var(--dana); color: white; width:100%" onclick="showConfirm()">SAYA SUDAH TRANSFER</button>
        <div id="confirmBox" style="display:none; margin-top:10px;">
            <button class="btn" style="background: var(--green); color: white; width:100%" onclick="processPayment()">KONFIRMASI</button>
        </div>
        <p onclick="closeModal()" style="margin-top:20px; font-size:12px; color:#555; cursor:pointer;">BATAL</p>
    </div>
</div>

<div class="float-wa" onclick="window.open('https://wa.me/6281469870881', '_blank')"><i class="fab fa-whatsapp"></i></div>
<footer>© 2026 GAROU STORE | @garoustore</footer>

<script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
<script>
    particlesJS("particles-js", { "particles": { "number": { "value": 40 }, "color": { "value": "#00d2ff" }, "line_linked": { "enable": true, "color": "#00d2ff" }, "move": { "enable": true, "speed": 1.5 } } });

    const initialData = [
        { id: 1, nama: "Akun Blox Fruit Premium", harga: "15.000", img: "https://via.placeholder.com/300", desc: ["Full Akses", "High Level"], stok: 10, status: "promo", rating: 5, rCount: 1, reviews: [{name: "Garou", text: "Terpercaya banget!", stars: 5}] }
    ];

    let products = JSON.parse(localStorage.getItem('garou_db_final')) || initialData;
    let selectedIdx = -1;
    let currentStars = 5;

    function renderProducts() {
        const list = document.getElementById("productList");
        list.innerHTML = "";
        products.forEach((p, index) => {
            const isHabis = p.stok <= 0;
            const namaLower = p.nama.toLowerCase();
            let badge = p.status === 'promo' ? '<div class="status-badge badge-promo">PROMO 🔥</div>' : (p.status === 'grosir' ? '<div class="status-badge badge-grosir">GROSIR 📦</div>' : '');
            
            // --- LOGIKA SAFETY BADGE OTOMATIS ---
            let safetyText = namaLower.includes("akun") ? "Anti HB, Aman 100%" : (namaLower.includes("script") ? "Anti Ban, Aman 100%" : "Aman 100% & Terpercaya");

            list.innerHTML += `
                <div class="card">
                    ${badge}
                    <div class="card-img" style="background-image: url('${p.img}')"><span class="stok-badge">STOK: ${p.stok}</span></div>
                    <div class="card-info">
                        <h3 style="margin:0">${p.nama}</h3>
                        <div class="rating-stars" onclick="openRating(${index})">
                            ${Array(5).fill().map((_, i) => `<i class="fas fa-star ${i < Math.round(p.rating) ? 'active' : ''}"></i>`).join('')}
                            <span style="font-size:10px; color:#555; margin-left:5px;">(${p.rCount}) - Beri Ulasan</span>
                        </div>
                        
                        <div style="color:var(--green); font-weight:bold; font-size:11px; background:rgba(37,211,102,0.1); padding:5px 10px; border-radius:8px; border:1px solid rgba(37,211,102,0.2); width:fit-content; margin: 10px 0;">
                            <i class="fas fa-shield-alt"></i> ${safetyText}
                        </div>

                        <ul class="specs">
                            ${(p.desc || []).map(d => `<li><i class="fas fa-check-circle" style="color:var(--blue)"></i> ${d}</li>`).join('')}
                        </ul>
                        <div class="review-box">
                            <strong>Ulasan Terbaru:</strong>
                            ${(p.reviews || []).slice(-1).map(r => `<div class="review-item"><b>${r.name}:</b> ${r.text}</div>`).join('')}
                        </div>
                        <p class="price">Rp ${p.harga}</p>
                        <button class="btn btn-buy" onclick="openCheckout(${index})" ${isHabis ? 'disabled' : ''}>${isHabis ? 'HABIS' : 'BELI SEKARANG'}</button>
                    </div>
                </div>`;
        });
    }

    function loginAdmin() { if(prompt("Password Owner:") === "anakpintar") openAdminPanel(); }
    function openAdminPanel() {
        document.body.classList.add("modal-open");
        const list = document.getElementById("adminList");
        list.innerHTML = products.map((p, i) => `
            <div style="border-bottom:1px solid #333; padding:10px 0; display:flex; gap:5px; flex-wrap:wrap;">
                <span style="font-size:11px; width:100%; color:var(--blue);">${p.nama}</span>
                <input type="text" id="editHarga-${i}" value="${p.harga}" class="admin-input" style="width:70px; margin:0;">
                <input type="number" id="editStok-${i}" value="${p.stok}" class="admin-input" style="width:50px; margin:0;">
                <select id="editStatus-${i}" class="admin-input" style="width:90px; margin:0; background:#000;">
                    <option value="normal" ${p.status==='normal'?'selected':''}>Normal</option>
                    <option value="promo" ${p.status==='promo'?'selected':''}>Promo</option>
                    <option value="grosir" ${p.status==='grosir'?'selected':''}>Grosir</option>
                </select>
                <button onclick="deleteProduct(${i})" style="background:var(--red); border:none; color:white; padding:5px 10px; border-radius:5px;"><i class="fas fa-trash"></i></button>
            </div>`).join('');
        document.getElementById("adminModal").style.display = "flex";
    }
    function addNewProduct() {
        const nama = document.getElementById("newNama").value;
        const harga = document.getElementById("newHarga").value;
        const stok = parseInt(document.getElementById("newStok").value) || 0;
        const status = document.getElementById("newStatus").value;
        const img = document.getElementById("newImg").value || 'https://via.placeholder.com/300';
        const desc = document.getElementById("newDesc").value.split(",");
        if(nama && harga) {
            products.push({ id: Date.now(), nama, harga, stok, status, img, desc, rating: 5, rCount: 1, reviews: [] });
            saveAndRefresh(); openAdminPanel();
        }
    }
    function deleteProduct(i) { products.splice(i, 1); saveAndRefresh(); openAdminPanel(); }
    function saveAdminChanges() {
        products.forEach((p, i) => {
            p.harga = document.getElementById(`editHarga-${i}`).value;
            p.stok = parseInt(document.getElementById(`editStok-${i}`).value);
            p.status = document.getElementById(`editStatus-${i}`).value;
        });
        saveAndRefresh(); closeAdmin();
    }
    function openRating(i) { selectedIdx = i; setStar(5); document.getElementById("ratingModal").style.display = "flex"; }
    function setStar(n) { currentStars = n; document.querySelectorAll("#starSelect i").forEach((s, i) => s.classList.toggle("active", i < n)); }
    function submitRating() {
        const p = products[selectedIdx];
        p.reviews.push({ name: document.getElementById("reviewerName").value || "Anonim", text: document.getElementById("reviewerText").value || "Bagus!", stars: currentStars });
        p.rCount++;
        p.rating = ((p.rating * (p.rCount-1)) + currentStars) / p.rCount;
        saveAndRefresh(); closeRating();
    }
    function saveAndRefresh() { localStorage.setItem('garou_db_final', JSON.stringify(products)); renderProducts(); }
    function openCheckout(i) { selectedIdx = i; document.getElementById("modalTitle").innerText = products[i].nama; document.getElementById("modalImg").src = products[i].img; document.getElementById("btnTransfer").style.display = "flex"; document.getElementById("confirmBox").style.display = "none"; document.getElementById("danaModal").style.display = "flex"; }
    function showConfirm() { document.getElementById("btnTransfer").style.display = "none"; document.getElementById("confirmBox").style.display = "block"; }
    function processPayment() {
        const p = products[selectedIdx];
        if(p.stok > 0) p.stok--;
        saveAndRefresh();
        document.getElementById("successPopup").classList.add("show");
        setTimeout(() => { window.open(`https://wa.me/6281469870881?text=Beli%20${p.nama}`, "_blank"); }, 1500);
    }
    function copyNum() { navigator.clipboard.writeText("081469870881"); alert("Salin!"); }
    function closeModal() { document.getElementById("danaModal").style.display = "none"; }
    function closeRating() { document.getElementById("ratingModal").style.display = "none"; }
    function closeAdmin() { document.getElementById("adminModal").style.display = "none"; document.body.classList.remove("modal-open"); }
    function searchProduct() { let kw = document.getElementById("search").value.toLowerCase(); document.querySelectorAll(".card").forEach(c => c.style.display = c.querySelector("h3").innerText.toLowerCase().includes(kw) ? "flex" : "none"); }
    window.onload = renderProducts;
</script>
</body>
</html>
